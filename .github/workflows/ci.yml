name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test-python:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build catalog UI
        run: |
          cd client
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev,otel]"

      - name: Verify SPA is packaged
        run: |
          python -c "
          from importlib import resources
          from pathlib import Path
          dist = Path(resources.files('dropmcp') / 'static' / 'dist')
          assert (dist / 'index.html').is_file(), 'SPA index.html missing from wheel'
          "

      - name: Ruff
        run: ruff check src

      - name: pytest
        run: pytest

  test-ui:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install and test UI
        run: |
          cd client
          npm ci
          npx playwright install --with-deps chromium
          npm run build
          npm test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/

  build-wheel:
    runs-on: ubuntu-26.04
    needs: [test-python, test-ui]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build catalog UI
        run: |
          cd client
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: pip install build && python -m build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dropmcp-wheel
          path: dist/*.whl

  publish-pypi:
    runs-on: ubuntu-26.04
    needs: [build-wheel]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build catalog UI
        run: |
          cd client
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: pip install build && python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
